<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Offline Clock App</title>

<!-- Inline CSS -->
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #282c34;
    color: #61dafb;
    flex-direction: column;
  }
  h1 {
    font-size: 3em;
    margin: 0;
  }
  p {
    margin-top: 0.5em;
    font-size: 1.2em;
  }
</style>

</head>
<body>

<h1 id="time">--:--:--</h1>
<p>Huidige tijd</p>

<!-- Inline JavaScript -->
<script>
// Update the time every second
function updateTime() {
  const now = new Date();
  document.getElementById('time').textContent = now.toLocaleTimeString();
}
//updateTime();
setInterval(updateTime, 1000);

</script>

</body>
</html>
